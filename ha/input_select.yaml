# Smart Mirror — input_select helpers
# Drop this file into HA `configuration.yaml` via `input_select: !include ha/input_select.yaml`
# Phase 02 of the autonomous build. See BACKEND_SPEC.md §3.1.

mirror_preset:
  name: Mirror Preset (bundle)
  icon: mdi:monitor-dashboard
  options:
    - auto
    - morning-minimal
    - morning-editorial
    - work-ops
    - work-minimal
    - relax-minimal
    - relax-editorial
    - shopping-minimal
    - shopping-ops
    - security-security
    - security-ops
    - night-minimal
    - night-security
    - ops-ops
    - guest-editorial
    - showcase-editorial
  initial: auto

mirror_mode:
  name: Mirror Mode
  icon: mdi:view-dashboard-variant
  options:
    - auto
    - morning
    - work
    - relax
    - shopping
    - security
    - night
    - ops
    - guest
    - showcase
    - editorial
  initial: auto

mirror_theme:
  name: Mirror Theme
  icon: mdi:palette
  options:
    - auto
    - minimal-dark
    - ops-cyberpunk
    - editorial
    - security
  initial: auto

mirror_orientation:
  name: Mirror Orientation
  icon: mdi:screen-rotation
  options:
    - portrait
    - landscape
  initial: portrait

mirror_resolution:
  name: Mirror Resolution
  icon: mdi:resize
  options:
    - 4k
    - 1440p
    - 1080p
  initial: 1080p
