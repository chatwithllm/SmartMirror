# Smart Mirror — Sunday 19:00 → shopping-minimal for 15 minutes.

alias: "Mirror · weekly inventory window"
id: mirror_inventory_weekly
mode: single

trigger:
  - platform: time
    at: "19:00:00"

condition:
  - condition: time
    weekday:
      - sun

action:
  - service: input_select.select_option
    target:
      entity_id: input_select.mirror_preset
    data:
      option: shopping-minimal
  - delay: "00:15:00"
  - service: input_select.select_option
    target:
      entity_id: input_select.mirror_preset
    data:
      option: auto
