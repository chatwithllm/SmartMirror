# Smart Mirror — gesture router.
# Fires mirror_gesture events from MQTT payloads, then maps each gesture
# to an HA service call. See BACKEND_SPEC.md §5 for the full mapping.

alias: "Mirror · gesture router"
id: mirror_gesture_router
mode: queued
max: 10

trigger:
  - platform: mqtt
    topic: mirror/gesture

condition:
  - condition: state
    entity_id: input_boolean.mirror_gesture_enable
    state: "on"

action:
  - event: mirror_gesture
    event_data:
      gesture: "{{ trigger.payload_json.gesture }}"
      confidence: "{{ trigger.payload_json.confidence }}"
  - choose:
      - conditions: "{{ trigger.payload_json.gesture == 'mode_next' }}"
        sequence:
          - service: input_select.select_next
            target:
              entity_id: input_select.mirror_mode
      - conditions: "{{ trigger.payload_json.gesture == 'mode_prev' }}"
        sequence:
          - service: input_select.select_previous
            target:
              entity_id: input_select.mirror_mode
      - conditions: "{{ trigger.payload_json.gesture == 'lock' }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.mirror_gesture_enable
      - conditions: "{{ trigger.payload_json.gesture in ['resize_grow','resize_shrink'] }}"
        sequence:
          - service: python_script.patch_mirror_layout
            data:
              tile_id: "{{ states('input_text.mirror_focused_tile') }}"
              delta: "{{ 1 if trigger.payload_json.gesture == 'resize_grow' else -1 }}"
