# Smart Mirror · gesture router
#
# Drop into /config/automations/ (or include via configuration.yaml). Two
# automations:
#
#   1. MQTT bridge — turns each `mirror/gesture` MQTT message into an
#      `event.mirror_gesture` on the HA event bus AND mirrors it into
#      `input_text.mirror_last_gesture` so the REST-poll frontend can
#      pick it up without a websocket.
#
#   2. Action fanout — handles HA-side gestures (mode_next/prev cycle
#      `input_select.mirror_mode`; lock toggles
#      `input_boolean.mirror_gesture_enable` off and re-enables after
#      5 minutes). UI-only gestures (focus, tile_fullscreen, alert_ack,
#      media_pause, resize_grow/shrink, wake) flow through the helper to
#      the client.
#
# Prereqs: mqtt: integration live, addons/mirror-gesture installed and
# enabled, input_boolean.mirror_gesture_enable on.

- alias: "Mirror · gesture · MQTT bridge"
  id: mirror_gesture_mqtt_bridge
  mode: queued
  max: 16
  trigger:
    - platform: mqtt
      topic: mirror/gesture
  condition:
    - condition: state
      entity_id: input_boolean.mirror_gesture_enable
      state: "on"
  action:
    # Fire on the bus first — automations that already key off
    # event.mirror_gesture (HA blueprints, NodeRED, voice flows) keep
    # working unchanged.
    - event: mirror_gesture
      event_data:
        gesture: "{{ trigger.payload_json.gesture }}"
        confidence: "{{ trigger.payload_json.confidence | float(0) }}"
        ts: "{{ trigger.payload_json.ts | float(0) }}"
        payload: "{{ trigger.payload_json.payload | default({}, true) }}"
    # Then mirror the latest into the helper that the kiosk polls.
    # Compact JSON keeps us under the 255-char input_text cap.
    - service: input_text.set_value
      target:
        entity_id: input_text.mirror_last_gesture
      data:
        value: >-
          {{
            {
              'gesture': trigger.payload_json.gesture,
              'ts': trigger.payload_json.ts | float(0),
              'payload': trigger.payload_json.payload | default({}, true)
            } | to_json
          }}

- alias: "Mirror · gesture · action fanout"
  id: mirror_gesture_action_fanout
  mode: queued
  max: 16
  trigger:
    - platform: event
      event_type: mirror_gesture
  action:
    - choose:
        - conditions:
            - "{{ trigger.event.data.gesture == 'mode_next' }}"
          sequence:
            - service: input_select.select_next
              target: { entity_id: input_select.mirror_mode }
              data: { cycle: true }
        - conditions:
            - "{{ trigger.event.data.gesture == 'mode_prev' }}"
          sequence:
            - service: input_select.select_previous
              target: { entity_id: input_select.mirror_mode }
              data: { cycle: true }
        - conditions:
            - "{{ trigger.event.data.gesture == 'lock' }}"
          sequence:
            # Closed-fist hold == "stop watching me". Disable the addon
            # for 5 min so the LED goes dark; re-enable on its own.
            - service: input_boolean.turn_off
              target: { entity_id: input_boolean.mirror_gesture_enable }
            - delay: { minutes: 5 }
            - service: input_boolean.turn_on
              target: { entity_id: input_boolean.mirror_gesture_enable }
      # All other gestures (wake, focus, resize_*, tile_*, alert_ack,
      # media_pause) are UI-only — the helper update fired by the bridge
      # automation above is enough; the kiosk picks them up via REST.
      default: []
