# Smart Mirror — swap to ops-ops when any service goes down.

alias: "Mirror · alert auto ops"
id: mirror_alert_auto_ops
mode: single

trigger:
  - platform: state
    entity_id: binary_sensor.any_service_down
    to: "on"

action:
  - service: input_select.select_option
    target:
      entity_id: input_select.mirror_preset
    data:
      option: ops-ops
