# Smart Mirror · Lovelace dashboard
#
# A single-view HA dashboard that exposes ONLY the mirror_* helpers from
# ha/packages/mirror.yaml. Use it as a standalone dashboard so the main
# HA UI stays clean.
#
# Install:
#   1. Settings → Dashboards → Add Dashboard → "New dashboard from scratch"
#      Title: Smart Mirror
#      URL:   smart-mirror   # HA requires a hyphen in url_path
#      Icon:  mdi:monitor-dashboard
#      Show in sidebar: on
#   2. Open the dashboard → pencil (edit) → three-dot menu →
#      Raw configuration editor → paste the contents below → Save.
#
# Everything here references entities created by the mirror package, so
# no other HA state is touched.

title: Smart Mirror
views:
  - title: Mirror
    path: mirror
    icon: mdi:monitor-dashboard
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Preset
            heading_style: title
            icon: mdi:view-dashboard-variant
          - type: entities
            show_header_toggle: false
            entities:
              - entity: input_select.mirror_preset
                name: Preset (bundle)
              - entity: input_select.mirror_mode
                name: Mode
              - entity: input_select.mirror_theme
                name: Theme
              - entity: input_select.mirror_orientation
                name: Orientation
              - entity: input_select.mirror_resolution
                name: Resolution

      - type: grid
        cards:
          - type: heading
            heading: Behavior
            heading_style: title
            icon: mdi:tune
          - type: entities
            show_header_toggle: false
            entities:
              - entity: input_boolean.mirror_screen_on
                name: Screen
                icon: mdi:monitor
              - entity: input_boolean.mirror_edit_mode
                name: Edit mode
              - entity: input_boolean.mirror_gesture_enable
                name: Gestures
              - entity: input_boolean.mirror_dnd
                name: Do not disturb
              - entity: input_text.mirror_focused_tile
                name: Focused tile
              - entity: input_number.mirror_override_minutes
                name: Override timeout

      - type: grid
        cards:
          - type: heading
            heading: Mirror PC
            heading_style: title
            icon: mdi:desktop-tower-monitor
          - type: glance
            show_name: true
            show_state: true
            show_icon: true
            state_color: false
            entities:
              - entity: sensor.mirror_cpu
                name: CPU
              - entity: sensor.mirror_ram
                name: RAM
              - entity: sensor.mirror_disk
                name: DISK
              - entity: sensor.mirror_uptime
                name: UP

      - type: grid
        cards:
          - type: heading
            heading: Controls
            heading_style: title
            icon: mdi:remote
          - type: horizontal-stack
            cards:
              - type: button
                name: Reload Browser
                icon: mdi:refresh
                entity: input_button.mirror_reload_browser
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.mirror_reload_browser
                show_state: false
              - type: button
                name: Restart Frontend
                icon: mdi:restart
                entity: input_button.mirror_restart_frontend
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.mirror_restart_frontend
                show_state: false
              - type: button
                name: Reboot PC
                icon: mdi:power
                entity: input_button.mirror_reboot
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.mirror_reboot
                confirmation:
                  text: Reboot the mirror PC now?
                show_state: false

      - type: grid
        cards:
          - type: heading
            heading: YouTube
            heading_style: title
            icon: mdi:youtube
          - type: horizontal-stack
            cards:
              - type: button
                name: Play/Pause
                icon: mdi:play-pause
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.mirror_yt_toggle
                show_state: false
              - type: button
                name: Mute
                icon: mdi:volume-mute
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.mirror_yt_mute
                show_state: false
              - type: button
                name: Skip 30s
                icon: mdi:skip-next
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.mirror_yt_skip
                show_state: false
          - type: horizontal-stack
            cards:
              - type: button
                name: Vol -
                icon: mdi:volume-minus
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.mirror_yt_vol_down
                show_state: false
              - type: button
                name: Vol +
                icon: mdi:volume-plus
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.mirror_yt_vol_up
                show_state: false

      - type: grid
        cards:
          - type: heading
            heading: Overscan (bezel inset)
            heading_style: title
            icon: mdi:border-all-variant
          - type: entities
            show_header_toggle: false
            entities:
              - entity: input_number.mirror_overscan_top
                name: Top
              - entity: input_number.mirror_overscan_right
                name: Right
              - entity: input_number.mirror_overscan_bottom
                name: Bottom
              - entity: input_number.mirror_overscan_left
                name: Left
