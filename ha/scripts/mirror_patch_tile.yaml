# Smart Mirror — accept a tile patch from the frontend (edit mode / gesture).
# Invoked by the frontend's drag/resize commit via a mirror.patch_layout
# service call; this script fans out to python_script.patch_mirror_layout.

alias: "Mirror · patch tile"
sequence:
  - service: python_script.patch_mirror_layout
    data:
      tile_id: "{{ tile_id }}"
      x: "{{ x | default(none) }}"
      y: "{{ y | default(none) }}"
      w: "{{ w | default(none) }}"
      h: "{{ h | default(none) }}"
  - service: python_script.build_mirror_layout
