# Smart Mirror · HA package
#
# Drop under /config/packages/mirror.yaml and add to configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# This package is intentionally thin: only the input_* helpers that the
# frontend polls over HA REST. Layout JSONs are bundled into the frontend
# build, so HA doesn't need python_script, template sensors, automations,
# or layout files to drive the mirror. Flip `input_select.mirror_preset`
# in the HA UI and the kiosk reacts within ~2s.

input_select:
  mirror_preset:
    name: Mirror Preset (bundle)
    icon: mdi:monitor-dashboard
    options:
      - auto
      - morning-minimal
      - morning-editorial
      - work-ops
      - work-minimal
      - relax-minimal
      - relax-editorial
      - shopping-minimal
      - shopping-ops
      - security-security
      - security-ops
      - night-minimal
      - night-security
      - ops-ops
      - guest-editorial
      - showcase-editorial
    initial: auto

  mirror_mode:
    name: Mirror Mode
    icon: mdi:view-dashboard-variant
    options:
      - auto
      - morning
      - work
      - relax
      - shopping
      - security
      - night
      - ops
      - guest
      - showcase
      - editorial
    initial: auto

  mirror_theme:
    name: Mirror Theme
    icon: mdi:palette
    options:
      - auto
      - minimal-dark
      - ops-cyberpunk
      - editorial
      - security
    initial: auto

  mirror_orientation:
    name: Mirror Orientation
    icon: mdi:screen-rotation
    options:
      - portrait
      - landscape
    initial: portrait

  mirror_resolution:
    name: Mirror Resolution
    icon: mdi:resize
    options:
      - 4k
      - 1440p
      - 1080p
    initial: 1080p

input_boolean:
  mirror_edit_mode:
    name: Mirror Edit Mode
    icon: mdi:resize
  mirror_gesture_enable:
    name: Mirror Gestures
    icon: mdi:gesture-tap
  mirror_dnd:
    name: Mirror Do Not Disturb
    icon: mdi:bell-off
  # Screen power. true = panel on, false = DPMS off. Mirror PC keeps
  # running; only the display goes dark/wakes.
  mirror_screen_on:
    name: Mirror Screen
    icon: mdi:monitor
    initial: true

# Press-to-act controls. Mirror frontend polls the state timestamp; a
# change = a press = execute. Nothing runs on HA side — the mirror box
# invokes the action locally, so no rest_command / ssh / token plumbing.
input_button:
  mirror_reload_browser:
    name: Mirror · Reload Browser
    icon: mdi:refresh
  mirror_restart_frontend:
    name: Mirror · Restart Frontend
    icon: mdi:restart
  mirror_reboot:
    name: Mirror · Reboot PC
    icon: mdi:power

input_text:
  mirror_focused_tile:
    name: Mirror Focused Tile
    max: 64
    initial: ""

input_number:
  mirror_override_minutes:
    name: Mirror Override Timeout
    min: 5
    max: 240
    step: 5
    initial: 60
    unit_of_measurement: min

  # Per-side overscan inset (% of viewport). Lets you hide content behind
  # TV bezels without touching CSS. Default 2 = 2vw each side; bump the
  # side that clips.
  mirror_overscan_top:
    name: Mirror Overscan Top
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_right:
    name: Mirror Overscan Right
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_bottom:
    name: Mirror Overscan Bottom
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_left:
    name: Mirror Overscan Left
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"

# Mirror the Screen toggle onto the TV itself so the panel doesn't
# sit on a "no signal" banner after DPMS kills HDMI sync. The PC side
# still runs its own DPMS in the mirror-frontend admin endpoint; this
# is the belt-and-suspenders partner that drives the TV via HA's
# Samsung Tizen integration.
#
# Swap the entity_id if the mirror moves to a different TV.
automation:
  - alias: "Mirror · screen off → TV standby"
    id: mirror_screen_off_tv_standby
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.mirror_screen_on
        to: "off"
    action:
      - service: media_player.turn_off
        target:
          entity_id: media_player.study_room_tv_2
  - alias: "Mirror · screen on → TV on"
    id: mirror_screen_on_tv_on
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.mirror_screen_on
        to: "on"
    action:
      - service: media_player.turn_on
        target:
          entity_id: media_player.study_room_tv_2
