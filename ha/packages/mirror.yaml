# Smart Mirror · HA package
#
# Drop under /config/packages/mirror.yaml and add to configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# This package is intentionally thin: only the input_* helpers that the
# frontend polls over HA REST. Layout JSONs are bundled into the frontend
# build, so HA doesn't need python_script, template sensors, automations,
# or layout files to drive the mirror. Flip `input_select.mirror_preset`
# in the HA UI and the kiosk reacts within ~2s.

input_select:
  mirror_preset:
    name: Mirror Preset (bundle)
    icon: mdi:monitor-dashboard
    options:
      - auto
      - morning-minimal
      - morning-editorial
      - work-ops
      - work-minimal
      - relax-minimal
      - relax-editorial
      - shopping-minimal
      - shopping-ops
      - security-security
      - security-ops
      - night-minimal
      - night-security
      - ops-ops
      - guest-editorial
      - showcase-editorial
    initial: auto

  mirror_mode:
    name: Mirror Mode
    icon: mdi:view-dashboard-variant
    options:
      - auto
      - morning
      - work
      - relax
      - shopping
      - security
      - night
      - ops
      - guest
      - showcase
      - editorial
    initial: auto

  mirror_theme:
    name: Mirror Theme
    icon: mdi:palette
    options:
      - auto
      - minimal-dark
      - ops-cyberpunk
      - editorial
      - security
    initial: auto

  mirror_orientation:
    name: Mirror Orientation
    icon: mdi:screen-rotation
    options:
      - portrait
      - landscape
    initial: portrait

  mirror_resolution:
    name: Mirror Resolution
    icon: mdi:resize
    options:
      - 4k
      - 1440p
      - 1080p
    initial: 1080p

input_boolean:
  mirror_edit_mode:
    name: Mirror Edit Mode
    icon: mdi:resize
  mirror_gesture_enable:
    name: Mirror Gestures
    icon: mdi:gesture-tap
  mirror_dnd:
    name: Mirror Do Not Disturb
    icon: mdi:bell-off

input_text:
  mirror_focused_tile:
    name: Mirror Focused Tile
    max: 64
    initial: ""

input_number:
  mirror_override_minutes:
    name: Mirror Override Timeout
    min: 5
    max: 240
    step: 5
    initial: 60
    unit_of_measurement: min
