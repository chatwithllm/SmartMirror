# Smart Mirror · HA package
#
# Drop under /config/packages/mirror.yaml and add to configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# This package is intentionally thin: only the input_* helpers that the
# frontend polls over HA REST. Layout JSONs are bundled into the frontend
# build, so HA doesn't need python_script, template sensors, automations,
# or layout files to drive the mirror. Flip `input_select.mirror_preset`
# in the HA UI and the kiosk reacts within ~2s.

input_select:
  # Curated preset list — only the ones actually tuned for this box.
  # Stock layouts (work-*, relax-*, shopping-*, guest-*, ops-ops,
  # *-editorial variants that never got the real HA entities wired)
  # live on disk under frontend/src/lib/layout/bundled/ so they can be
  # re-enabled by listing them here again.
  mirror_preset:
    name: Mirror Preset (bundle)
    icon: mdi:monitor-dashboard
    options:
      - auto
      - morning-minimal
      - night-minimal
      - security-security
      - showcase-editorial
      - editorial-daily
      - shopping-minimal
      - minimal
      - glass
    initial: auto

  mirror_mode:
    name: Mirror Mode
    icon: mdi:view-dashboard-variant
    options:
      - auto
      - morning
      - night
      - security
      - showcase
      - editorial
      - shopping
      - minimal
      - glass
    initial: auto

  mirror_theme:
    name: Mirror Theme
    icon: mdi:palette
    options:
      - auto
      - minimal-dark
      - ops-cyberpunk
      - editorial
      - security
    initial: auto

  mirror_orientation:
    name: Mirror Orientation
    icon: mdi:screen-rotation
    options:
      - portrait
      - landscape
    initial: portrait

  mirror_resolution:
    name: Mirror Resolution
    icon: mdi:resize
    options:
      - 4k
      - 1440p
      - 1080p
    initial: 1080p

input_boolean:
  mirror_edit_mode:
    name: Mirror Edit Mode
    icon: mdi:resize
  mirror_gesture_enable:
    name: Mirror Gestures
    icon: mdi:gesture-tap
  mirror_dnd:
    name: Mirror Do Not Disturb
    icon: mdi:bell-off
  # Flip the morning-minimal MorningTile from warm-dark (default) to a
  # pale dawn palette for daylight / glare-heavy rooms. Polled by the
  # tile every 5 s.
  mirror_light_mode:
    name: Mirror Light Mode
    icon: mdi:white-balance-sunny
  # Screen power. true = panel on, false = DPMS off. Mirror PC keeps
  # running; only the display goes dark/wakes.
  mirror_screen_on:
    name: Mirror Screen
    icon: mdi:monitor
    initial: true

# Press-to-act controls. Mirror frontend polls the state timestamp; a
# change = a press = execute. Nothing runs on HA side — the mirror box
# invokes the action locally, so no rest_command / ssh / token plumbing.
input_button:
  mirror_reload_browser:
    name: Mirror · Reload Browser
    icon: mdi:refresh
  mirror_restart_frontend:
    name: Mirror · Restart Frontend
    icon: mdi:restart
  mirror_reboot:
    name: Mirror · Reboot PC
    icon: mdi:power
  # YouTube tile remote control. Pressing these pokes the YT IFrame
  # Player on the kiosk via the mirror frontend's in-browser dispatcher;
  # no server exec needed.
  mirror_yt_toggle:
    name: Mirror · YT Play/Pause
    icon: mdi:play-pause
  mirror_yt_mute:
    name: Mirror · YT Mute
    icon: mdi:volume-mute
  mirror_yt_vol_up:
    name: Mirror · YT Volume +
    icon: mdi:volume-plus
  mirror_yt_vol_down:
    name: Mirror · YT Volume -
    icon: mdi:volume-minus
  mirror_yt_skip:
    name: Mirror · YT Skip 30s
    icon: mdi:skip-next

input_text:
  mirror_focused_tile:
    name: Mirror Focused Tile
    max: 64
    initial: ""
  # Type a YouTube URL or 11-char ID here; the mirror polls the value
  # and loads the matching video in the tile. HA mobile app supports
  # this natively — long-press tile → "Set value" → paste a share URL.
  mirror_yt_video:
    name: Mirror · YT Video URL / ID
    # HA caps input_text max at 255; 256 fails validation silently and
    # the whole input_text block is skipped, taking the other entities
    # with it. Keep at 255 — a YouTube share URL is ~43 chars, a full
    # watch URL with params is ~110.
    max: 255
    initial: ""

input_number:
  mirror_override_minutes:
    name: Mirror Override Timeout
    min: 5
    max: 240
    step: 5
    initial: 60
    unit_of_measurement: min

  # Per-side overscan inset (% of viewport). Lets you hide content behind
  # TV bezels without touching CSS. Default 2 = 2vw each side; bump the
  # side that clips.
  mirror_overscan_top:
    name: Mirror Overscan Top
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_right:
    name: Mirror Overscan Right
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_bottom:
    name: Mirror Overscan Bottom
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_left:
    name: Mirror Overscan Left
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"

# Pull CPU / RAM / DISK from the mirror's /api/admin/stats endpoint
# and surface as HA sensors. The HA dashboard renders them as three
# chips above the Controls card.
#
# Resource URL: edit to match the mirror's LAN IP or mDNS name.
rest:
  - resource: "http://192.168.20.106:3000/api/admin/stats"
    scan_interval: 10
    timeout: 4
    sensor:
      - name: Mirror CPU
        unique_id: mirror_cpu
        value_template: "{{ value_json.cpu }}"
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:chip
      - name: Mirror RAM
        unique_id: mirror_ram
        value_template: "{{ value_json.ram }}"
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:memory
      - name: Mirror Disk
        unique_id: mirror_disk
        value_template: "{{ value_json.disk }}"
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:harddisk
      # Raw uptime in seconds — useful for automations / graphing.
      - name: Mirror Uptime Seconds
        unique_id: mirror_uptime_seconds
        value_template: "{{ value_json.uptime_seconds }}"
        unit_of_measurement: "s"
        device_class: duration
        state_class: total_increasing
        icon: mdi:timer-outline
      # Human-readable uptime — "3d 5h", "2h 14m", "45m". Dashboard
      # shows this one; the raw seconds sensor stays for metrics.
      - name: Mirror Uptime
        unique_id: mirror_uptime
        icon: mdi:timer-outline
        value_template: >-
          {% set s = value_json.uptime_seconds | int(0) %}
          {% set d = s // 86400 %}
          {% set h = (s % 86400) // 3600 %}
          {% set m = (s % 3600) // 60 %}
          {% if d > 0 %}{{ d }}d {{ h }}h
          {%- elif h > 0 %}{{ h }}h {{ m }}m
          {%- else %}{{ m }}m{% endif %}

# The mirror toggle is handled entirely on the mirror PC (xset DPMS).
# We tried KEY_ENERGY_SAVING → TU7000 didn't honour it, and we tried
# media_player.turn_off/on → standby wake needs Wake-on-LAN.
#
# Working combo on TU7000:
#   1. Mirror PC DPMS cuts HDMI signal → TV drops to eco-standby on
#      its own ~15 s after losing sync.
#   2. On toggle-on, DPMS restores HDMI → TV auto-wakes via Anynet+.
#
# TV settings required (one-time, on TU7000):
#   • Settings → General → External Device Manager → Anynet+ (HDMI-CEC) → On
#   • Settings → General → Power & Energy Saving → Auto Power Off → Off
#     (so the TV doesn't permanently kill itself after 4 h of no signal)
#
# If this setup ever needs a hard TV-side command again, add a new
# automation block here; nothing else depends on automations living
# in this package.
