# Smart Mirror · HA package
#
# Drop under /config/packages/mirror.yaml and add to configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# This package is intentionally thin: only the input_* helpers that the
# frontend polls over HA REST. Layout JSONs are bundled into the frontend
# build, so HA doesn't need python_script, template sensors, automations,
# or layout files to drive the mirror. Flip `input_select.mirror_preset`
# in the HA UI and the kiosk reacts within ~2s.

input_select:
  mirror_preset:
    name: Mirror Preset (bundle)
    icon: mdi:monitor-dashboard
    options:
      - auto
      - morning-minimal
      - morning-editorial
      - work-ops
      - work-minimal
      - relax-minimal
      - relax-editorial
      - shopping-minimal
      - shopping-ops
      - security-security
      - security-ops
      - night-minimal
      - night-security
      - ops-ops
      - guest-editorial
      - showcase-editorial
    initial: auto

  mirror_mode:
    name: Mirror Mode
    icon: mdi:view-dashboard-variant
    options:
      - auto
      - morning
      - work
      - relax
      - shopping
      - security
      - night
      - ops
      - guest
      - showcase
      - editorial
    initial: auto

  mirror_theme:
    name: Mirror Theme
    icon: mdi:palette
    options:
      - auto
      - minimal-dark
      - ops-cyberpunk
      - editorial
      - security
    initial: auto

  mirror_orientation:
    name: Mirror Orientation
    icon: mdi:screen-rotation
    options:
      - portrait
      - landscape
    initial: portrait

  mirror_resolution:
    name: Mirror Resolution
    icon: mdi:resize
    options:
      - 4k
      - 1440p
      - 1080p
    initial: 1080p

input_boolean:
  mirror_edit_mode:
    name: Mirror Edit Mode
    icon: mdi:resize
  mirror_gesture_enable:
    name: Mirror Gestures
    icon: mdi:gesture-tap
  mirror_dnd:
    name: Mirror Do Not Disturb
    icon: mdi:bell-off
  # Screen power. true = panel on, false = DPMS off. Mirror PC keeps
  # running; only the display goes dark/wakes.
  mirror_screen_on:
    name: Mirror Screen
    icon: mdi:monitor
    initial: true

# Press-to-act controls. Mirror frontend polls the state timestamp; a
# change = a press = execute. Nothing runs on HA side — the mirror box
# invokes the action locally, so no rest_command / ssh / token plumbing.
input_button:
  mirror_reload_browser:
    name: Mirror · Reload Browser
    icon: mdi:refresh
  mirror_restart_frontend:
    name: Mirror · Restart Frontend
    icon: mdi:restart
  mirror_reboot:
    name: Mirror · Reboot PC
    icon: mdi:power

input_text:
  mirror_focused_tile:
    name: Mirror Focused Tile
    max: 64
    initial: ""

input_number:
  mirror_override_minutes:
    name: Mirror Override Timeout
    min: 5
    max: 240
    step: 5
    initial: 60
    unit_of_measurement: min

  # Per-side overscan inset (% of viewport). Lets you hide content behind
  # TV bezels without touching CSS. Default 2 = 2vw each side; bump the
  # side that clips.
  mirror_overscan_top:
    name: Mirror Overscan Top
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_right:
    name: Mirror Overscan Right
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_bottom:
    name: Mirror Overscan Bottom
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"
  mirror_overscan_left:
    name: Mirror Overscan Left
    min: 0
    max: 15
    step: 0.5
    initial: 2
    unit_of_measurement: "%"

# Pull CPU / RAM / DISK from the mirror's /api/admin/stats endpoint
# and surface as HA sensors. The HA dashboard renders them as three
# chips above the Controls card.
#
# Resource URL: edit to match the mirror's LAN IP or mDNS name.
rest:
  - resource: "http://192.168.20.106:3000/api/admin/stats"
    scan_interval: 10
    timeout: 4
    sensor:
      - name: Mirror CPU
        unique_id: mirror_cpu
        value_template: "{{ value_json.cpu }}"
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:chip
      - name: Mirror RAM
        unique_id: mirror_ram
        value_template: "{{ value_json.ram }}"
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:memory
      - name: Mirror Disk
        unique_id: mirror_disk
        value_template: "{{ value_json.disk }}"
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:harddisk

# The mirror toggle is handled entirely on the mirror PC (xset DPMS).
# We tried KEY_ENERGY_SAVING → TU7000 didn't honour it, and we tried
# media_player.turn_off/on → standby wake needs Wake-on-LAN.
#
# Working combo on TU7000:
#   1. Mirror PC DPMS cuts HDMI signal → TV drops to eco-standby on
#      its own ~15 s after losing sync.
#   2. On toggle-on, DPMS restores HDMI → TV auto-wakes via Anynet+.
#
# TV settings required (one-time, on TU7000):
#   • Settings → General → External Device Manager → Anynet+ (HDMI-CEC) → On
#   • Settings → General → Power & Energy Saving → Auto Power Off → Off
#     (so the TV doesn't permanently kill itself after 4 h of no signal)
#
# If this setup ever needs a hard TV-side command again, add a new
# automation block here; nothing else depends on automations living
# in this package.
